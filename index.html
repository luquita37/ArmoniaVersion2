    <script>
      (function() {
        var eventFired = false; // Bandera para asegurar que solo se dispare una vez

        window.addEventListener('scroll', function() {
          if (eventFired) return; // Si ya se disparó, no hacer nada

          // Calcular altura total del documento y altura de la ventana
          var docHeight = document.documentElement.scrollHeight;
          var winHeight = window.innerHeight;
          var scrollTop = window.scrollY || document.documentElement.scrollTop;

          // Calcular porcentaje (evitar división por cero si la página no tiene scroll)
          var scrollableHeight = docHeight - winHeight;
          if (scrollableHeight <= 0) return;

          var scrollPercent = (scrollTop / scrollableHeight) * 100;

          // Si el porcentaje es mayor o igual al 50%
          if (scrollPercent >= 50) {
            fbq('track', 'ViewContent'); // Dispara el evento a Meta
            eventFired = true; // Marca como disparado
          }
        });
      })();
  </script>
